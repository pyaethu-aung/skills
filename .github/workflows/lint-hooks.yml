name: Lint Hook Scripts

on:
  pull_request:
    branches: [main]
    paths:
      - '.claude/hooks/**'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on hooks
        run: shellcheck .claude/hooks/*.sh
